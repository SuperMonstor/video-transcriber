appId: com.debateclub.videotranscriber
productName: Video Transcriber

directories:
  output: release
  buildResources: build

# Only the built output ships in the asar; node_modules are pruned by builder.
files:
  - out/**
  - "package.json"
  - "!**/*.map"

asar: true

mac:
  category: public.app-category.productivity
  # zip is required alongside dmg so electron-updater has something to download
  # and electron-builder emits latest-mac.yml.
  target:
    - target: dmg
      arch: arm64
    - target: zip
      arch: arm64
  # Self-contained whisper-cli + ffmpeg for Apple Silicon, flattened to
  # Contents/Resources/bin (where src/main/binaries.ts looks when packaged).
  extraResources:
    - from: resources/bin/mac
      to: bin

win:
  # nsis (installer + auto-update) is built on a Windows CI runner — no Wine.
  # For a quick local Wine-free build, override with: electron-builder --win zip
  # (see `npm run package:win:zip`).
  target:
    - target: nsis
      arch: x64
  extraResources:
    - from: resources/bin/win
      to: bin

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

# Auto-update feed (wired up in M2). Repo must exist + be public.
publish:
  provider: github
  owner: SuperMonstor
  repo: video-transcriber

artifactName: ${productName}-${version}-${arch}.${ext}
