appId: com.debateclub.videotranscriber
productName: Video Transcriber

directories:
  output: release
  buildResources: build

# Only the built output ships in the asar; node_modules are pruned by builder.
files:
  - out/**
  - "package.json"
  - "!**/*.map"

asar: true

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: arm64
  # Self-contained whisper-cli + ffmpeg for Apple Silicon, flattened to
  # Contents/Resources/bin (where src/main/binaries.ts looks when packaged).
  extraResources:
    - from: resources/bin/mac
      to: bin

win:
  # M1: zip is buildable on macOS without Wine — friend unzips and runs the .exe.
  # M2 switches to nsis (+ auto-update) built on a Windows CI runner (no Wine).
  target:
    - target: zip
      arch: x64
  extraResources:
    - from: resources/bin/win
      to: bin

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

# Auto-update feed (wired up in M2). Repo must exist + be public.
publish:
  provider: github
  owner: SuperMonstor
  repo: video-transcriber

artifactName: ${productName}-${version}-${arch}.${ext}
