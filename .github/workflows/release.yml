name: Release

# Push a version tag to build + publish installers for both platforms:
#   npm version patch && git push --follow-tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release + upload assets

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS re-enabled once self-contained mac binaries are staged
          # (dylib relocation). Until then, Windows-only.
          # - os: macos-14
          #   platform: mac
          - os: windows-latest # x64, native NSIS build (no Wine)
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Cache the staged native binaries (keyed by the manifest), so only the
      # first release downloads the ~677 MB CUDA build — later releases reuse it.
      - name: Cache native binaries
        id: bincache
        uses: actions/cache@v4
        with:
          path: resources/bin/${{ matrix.platform }}
          key: bin-${{ matrix.platform }}-${{ hashFiles('scripts/stage-binaries.mjs') }}

      # Pull whisper-cli + ffmpeg into resources/bin/<platform> (skip on cache hit).
      - if: steps.bincache.outputs.cache-hit != 'true'
        run: node scripts/stage-binaries.mjs ${{ matrix.platform }}

      # Build renderer/main/preload, then package + publish to the Release.
      - run: npx electron-vite build && npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple certs in CI yet — ship unsigned (Gatekeeper warning).
          CSC_IDENTITY_AUTO_DISCOVERY: false
