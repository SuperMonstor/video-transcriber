name: Release

# Push a version tag to build + publish installers for both platforms:
#   npm version patch && git push --follow-tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release + upload assets

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon (arm64); signed + notarized dmg/zip
            platform: mac
          - os: windows-latest # x64, native NSIS build (no Wine)
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Cache the staged native binaries (keyed by the manifest), so only the
      # first release downloads the ~677 MB CUDA build — later releases reuse it.
      - name: Cache native binaries
        id: bincache
        uses: actions/cache@v4
        with:
          path: resources/bin/${{ matrix.platform }}
          key: bin-${{ matrix.platform }}-${{ hashFiles('scripts/stage-binaries.mjs') }}

      # macOS staging relocates Homebrew binaries — install the formulae first.
      - if: matrix.platform == 'mac' && steps.bincache.outputs.cache-hit != 'true'
        run: brew install whisper-cpp ffmpeg dylibbundler

      # Pull whisper-cli + ffmpeg into resources/bin/<platform> (skip on cache hit).
      - if: steps.bincache.outputs.cache-hit != 'true'
        run: node scripts/stage-binaries.mjs ${{ matrix.platform }}

      # Build renderer/main/preload, then package + publish to the Release.
      - run: npx electron-vite build && npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # mac signing cert (base64 .p12 + password); empty on Windows so it
          # doesn't try to sign the .exe with a mac cert.
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          # notarization creds (mac only; ignored by the Windows build)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
